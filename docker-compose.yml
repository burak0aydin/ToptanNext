version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: toptannext-db
    environment:
      POSTGRES_USER: toptannext
      POSTGRES_PASSWORD: password
      POSTGRES_DB: toptannext
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toptannext"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    container_name: toptannext-db-test
    environment:
      POSTGRES_USER: toptannext
      POSTGRES_PASSWORD: password
      POSTGRES_DB: toptannext_test
    ports:
      - "5433:5432"

  redis:
    image: redis:7-alpine
    container_name: toptannext-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: toptannext-search
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: "masterKey"
    volumes:
      - meilisearch_data:/meili_data

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
